<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शाळा रजा व्यवस्थापन प्रणाली २०२६</title>
    
    <!-- PWA Manifest Link (मोबाईल ॲप कनेक्शन) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1F4E78">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- 🍎 आयफोनवर मूळ शाळा लोगो दिसण्यासाठी खास ओळ -->
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Service Worker Registration Script -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker Registered!', reg))
                    .catch(err => console.log('Service Worker Reg Failed:', err));
            });
        }
    </script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f7f6; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- गुगल मॅक्रोला थेट बायपास करणारी पूर्णपणे नवीन अपडेटेड फ्रेम -->
    <iframe src="https://script.google.com/macros/s/AKfycbyIRv8bQtM1qxeOKF3LiTYDKLZp2XL56POIzecB8kbPYbkFfhuOPl7n-K6qcdcO_YJ6kQ/exec"></iframe>
</body>
</html>
